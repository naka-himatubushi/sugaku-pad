# xcodegen プロジェクト定義。`xcodegen generate` で MathAI.xcodeproj を生成する。
# .xcodeproj は生成物なので git 管理せず、この project.yml と Swift ソースを管理する。
name: MathAI
options:
  bundleIdPrefix: com.nakazawa
  deploymentTarget:
    iOS: "17.0"   # PencilKit は 13+。Foundation Models は実行時 @available(iOS 26) で分岐
# MLX Swift（端末内 VLM 推論）。MLXVLM を含む最新タグ 2.29.1 にピン。
# main は MLXVLM を別リポジトリ(mlx-swift-lm)へ移動済みのため使わない。
packages:
  mlx-swift-examples:
    url: https://github.com/ml-explore/mlx-swift-examples
    exactVersion: 2.29.1
  mlx-swift:   # MLX 本体（GPU キャッシュ制御 import MLX 用）。2.29.1 が要求する 0.25.x に合わせる
    url: https://github.com/ml-explore/mlx-swift
    from: "0.25.5"
  SwiftMath:   # LaTeX 数式をネイティブ描画(Web の KaTeX 相当)。認識式/答えを読みやすく表示
    url: https://github.com/mgriebling/SwiftMath
    exactVersion: 1.7.3
targets:
  MathAI:
    type: application
    platform: iOS
    sources:
      - path: ios   # iOS アプリの Swift/ObjC ソース。vendor(DL物) と python-ios(生成ペイロード) は除外
        excludes:
          - vendor
          - python-ios
      # 自前コードと依存をフォルダ参照でバンドル（構造を保持）。
      # python(標準ライブラリ) はビルド時に install_python が xcframework から配置する。
      - { path: ios/python-ios/app, buildPhase: resources, type: folder }
      - { path: ios/python-ios/app_packages, buildPhase: resources, type: folder }
    dependencies:
      - package: mlx-swift-examples
        product: MLXVLM
      - package: mlx-swift-examples
        product: MLXLMCommon
      - package: mlx-swift
        product: MLX
      - package: SwiftMath
        product: SwiftMath
      # 埋め込み CPython（BeeWare Python-Apple-support）。embed + 署名して同梱
      - framework: ios/vendor/python-apple-support/Python.xcframework
        embed: true
        codeSign: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nakazawa.mathai
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: SugakuPad   # ホーム画面の表示名（内部ターゲット名/bundle id は MathAI のまま据え置き）
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        TARGETED_DEVICE_FAMILY: "2"   # iPad
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_OBJC_BRIDGING_HEADER: ios/Bridge/MathAI-Bridging-Header.h
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
    # 実機/シミュレータ向けに Python 標準ライブラリを配置し、C拡張(.so)を
    # 署名フレームワーク化する公式スクリプト（BeeWare）。Copy Resources の後に走る。
    postBuildScripts:
      - name: "Install Python (stdlib + dynload→framework)"
        script: |
          set -e
          source "$PROJECT_DIR/ios/vendor/python-apple-support/Python.xcframework/build/utils.sh"
          install_python ios/vendor/python-apple-support/Python.xcframework app app_packages
