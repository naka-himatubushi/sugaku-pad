<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>MathAI — 手書き数式 Solve</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 16px; background: #f5f5f7; color: #1d1d1f; }
    h1 { font-size: 1.1rem; }
    canvas { background: #fff; border: 1px solid #c7c7cc; border-radius: 12px; touch-action: none; width: 100%; max-width: 640px; height: 240px; }
    .row { margin: 12px 0; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    button { font-size: 1rem; padding: 8px 14px; border: 0; border-radius: 10px; background: #007aff; color: #fff; }
    button.secondary { background: #e5e5ea; color: #1d1d1f; }
    input[type=text] { font-size: 1rem; padding: 8px 10px; border: 1px solid #c7c7cc; border-radius: 10px; min-width: 240px; flex: 1; }
    .card { background: #fff; border-radius: 12px; padding: 14px; margin-top: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .muted { color: #6e6e73; font-size: .85rem; }
    ol { margin: 8px 0 0; padding-left: 1.3em; }
    li { margin: 4px 0; }
    .answer { font-size: 1.2rem; font-weight: 600; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>MathAI — 手書き数式を解く（検証ハーネス）</h1>
  <p class="muted">数式を手書き →「認識して解く」。または下のテキスト欄に直接入力。</p>
  <canvas id="pad" width="1280" height="480"></canvas>
  <div class="row">
    <button onclick="recognizeAndSolve()">認識して解く</button>
    <button class="secondary" onclick="clearPad()">クリア</button>
  </div>
  <div class="row">
    <input id="latex" type="text" placeholder="例: 2x + 3 = 7 / \frac{x}{2}+1=4" value="2x + 3 = 7" />
    <button onclick="solveText()">テキストで解く</button>
  </div>
  <div id="result" class="card" style="display:none"></div>

<script>
const pad = document.getElementById('pad');
const ctx = pad.getContext('2d');
ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.strokeStyle = '#000';
let drawing = false, last = null;
function pos(e){ const r = pad.getBoundingClientRect(); const t = e.touches ? e.touches[0] : e;
  return { x: (t.clientX - r.left) * pad.width / r.width, y: (t.clientY - r.top) * pad.height / r.height }; }
function start(e){ drawing = true; last = pos(e); e.preventDefault(); }
function move(e){ if(!drawing) return; const p = pos(e); ctx.beginPath(); ctx.moveTo(last.x,last.y); ctx.lineTo(p.x,p.y); ctx.stroke(); last = p; e.preventDefault(); }
function end(){ drawing = false; }
pad.addEventListener('pointerdown', start); pad.addEventListener('pointermove', move);
pad.addEventListener('pointerup', end); pad.addEventListener('pointerleave', end);
function clearPad(){ ctx.clearRect(0,0,pad.width,pad.height); }

async function postSolve(body){
  const res = await fetch('/solve', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
  return res.json();
}
function render(data){
  const el = document.getElementById('result');
  el.style.display = 'block';
  if(!data.supported){
    el.innerHTML = '<div class="muted">認識結果（確認）</div><div id="rl"></div><p>⚠️ 対応範囲外、または認識に失敗しました。テキスト欄で修正して再試行してください。</p>';
    if(data.latex) katex.render(data.latex, document.getElementById('rl'), {throwOnError:false});
    return;
  }
  const steps = data.steps.map(s => `<li>${s}</li>`).join('');
  el.innerHTML = `<div class="muted">認識結果（確認・編集はテキスト欄）</div><div id="rl"></div>
    <div class="muted" style="margin-top:8px">種別: ${data.kind}</div>
    <ol>${steps}</ol>
    <div class="answer">答え: ${data.answer.join(', ')}</div>`;
  katex.render(data.latex, document.getElementById('rl'), {throwOnError:false});
  document.getElementById('latex').value = data.latex;
}
async function recognizeAndSolve(){ render(await postSolve({ image: pad.toDataURL('image/png') })); }
async function solveText(){ render(await postSolve({ latex: document.getElementById('latex').value })); }
</script>
</body>
</html>
